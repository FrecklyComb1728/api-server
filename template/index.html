<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${projectName}</title>
<link rel="icon" href="favicon.ico">
<meta name="description" content="${projectName} - API 聚合服务">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fafafa;
    color: #18181b;
    font-family: 'Inter', -apple-system, sans-serif;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #09090b; color: #e4e4e7; }
    .card { background: #18181b; border-color: #27272a; }
    th { color: #71717a; }
    td { color: #a1a1aa; }
    .text-dim { color: #71717a; }
    .text-muted { color: #52525b; }
    .summary { color: #71717a; }
    details { border-color: #27272a; }
    details[open] { border-color: #2563eb; }
  }
  pre, code, .mono { font-family: 'JetBrains Mono', 'Fira Code', monospace; }
  .card {
    background: #fff;
    border: 1px solid #e4e4e7;
    border-radius: 8px;
  }
  .method {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
  }
  .method-get { background: #dcfce7; color: #166534; }
  @media (prefers-color-scheme: dark) {
    .method-get { background: #052e16; color: #4ade80; }
  }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; font-weight: 500; color: #71717a; font-size: 12px; padding: 8px 12px; border-bottom: 1px solid #e4e4e7; }
  td { padding: 10px 12px; border-bottom: 1px solid #f4f4f5; vertical-align: top; }
  @media (prefers-color-scheme: dark) {
    th { border-bottom-color: #27272a; }
    td { border-bottom-color: #1c1c1e; }
  }
  tr:last-child td { border-bottom: none; }
  a { color: #2563eb; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .text-dim { color: #71717a; }
  .text-muted { color: #a1a1aa; }
  .summary { color: #71717a; font-size: 12px; margin-left: 8px; }
  details {
    border: 1px solid #e4e4e7;
    border-radius: 8px;
    margin-bottom: 8px;
    background: #fff;
    transition: border-color 0.15s;
  }
  details[open] { border-color: #2563eb; }
  summary {
    padding: 12px 16px;
    cursor: pointer;
    font-weight: 500;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    list-style: none;
    user-select: none;
  }
  summary::-webkit-details-marker { display: none; }
  summary::before {
    content: '';
    display: inline-block;
    width: 0; height: 0;
    border-left: 5px solid #71717a;
    border-top: 4px solid transparent;
    border-bottom: 4px solid transparent;
    transition: transform 0.15s;
  }
  details[open] summary::before { transform: rotate(90deg); }
  summary:hover { background: #f9fafb; }
  @media (prefers-color-scheme: dark) {
    summary:hover { background: #1c1c1e; }
  }
  .detail-content { padding: 0 16px 16px; }
</style>
</head>
<body>

<div style="max-width: 960px; margin: 0 auto; padding: 24px 20px;">

  <header style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px;">
    <div style="display: flex; align-items: center; gap: 10px;">
      <img src="./image/1024x1024.png" alt="Logo" style="width: 32px; height: 32px; border-radius: 6px;">
      <span style="font-weight: 600; font-size: 16px;">${projectName}</span>
    </div>
    <div style="display: flex; align-items: center; gap: 16px;">
      <span class="text-dim" style="font-size: 13px;">限流: ${maxRequests}/${timeWindow}s</span>
      <span class="text-dim" style="font-size: 13px;">UTC+${timezone}</span>
      <a href="https://github.com/FrecklyComb1728/api-server" target="_blank" style="color: #71717a; display: flex; align-items: center;">
        <svg style="width:20px;height:20px" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2A10 10 0 0 0 2 12c0 4.42 2.87 8.17 6.84 9.5c.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34c-.46-1.16-1.11-1.47-1.11-1.47c-.91-.62.07-.6.07-.6c1 .07 1.53 1.03 1.53 1.03c.87 1.52 2.34 1.07 2.91.83c.09-.65.35-1.09.63-1.34c-2.22-.25-4.55-1.11-4.55-4.92c0-1.11.38-2 1.03-2.71c-.1-.25-.45-1.29.1-2.64c0 0 .84-.27 2.75 1.02c.79-.22 1.65-.33 2.5-.33c.85 0 1.71.11 2.5.33c1.91-1.29 2.75-1.02 2.75-1.02c.55 1.35.2 2.39.1 2.64c.65.71 1.03 1.6 1.03 2.71c0 3.82-2.34 4.66-4.57 4.91c.36.31.69.92.69 1.85V21c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12A10 10 0 0 0 12 2"/></svg>
      </a>
    </div>
  </header>

  <section style="margin-bottom: 32px;">
    <h2 style="font-size: 14px; font-weight: 600; margin-bottom: 16px; color: #71717a; text-transform: uppercase; letter-spacing: 0.5px;">API 端点</h2>
    <div id="modulesContainer">
      <div class="text-dim" style="padding: 20px 0;">加载中...</div>
    </div>
  </section>

  <section style="margin-bottom: 32px;">
    <h2 style="font-size: 14px; font-weight: 600; margin-bottom: 16px; color: #71717a; text-transform: uppercase; letter-spacing: 0.5px;">文档</h2>
    <div id="docsContainer" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px;">
      <a href="docs/README.md" class="card" style="padding: 12px 16px; display: block;">
        <div style="font-size: 12px; color: #71717a;">入门</div>
        <div style="font-size: 14px; font-weight: 500;">README</div>
      </a>
    </div>
  </section>

  <footer style="border-top: 1px solid #e4e4e7; padding-top: 16px; display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: #a1a1aa;">
    <span>Copyright &copy; <span id="year"></span> ${projectName}</span>
    <div style="display: flex; gap: 16px;">
      <a href="https://github.com/FrecklyComb1728/api-server" target="_blank" style="color: #a1a1aa;">GitHub</a>
      <a href="https://imbee.top" target="_blank" style="color: #a1a1aa;">MIFENG</a>
    </div>
  </footer>

</div>

<script>
document.getElementById('year').textContent = new Date().getFullYear();

let apiDir = '${apiDir}';

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

async function loadApiModules() {
  try {
    const res = await fetch('/' + apiDir + '/meta');
    if (!res.ok) throw new Error('加载失败');
    const data = await res.json();

    apiDir = data.apiDir;
    const container = document.getElementById('modulesContainer');

    if (!data.modules || data.modules.length === 0) {
      container.innerHTML = '<div class="text-dim" style="padding: 20px 0;">暂无 API 模块</div>';
      return;
    }

    let html = '';
    data.modules.forEach(mod => {
      html += '<details>';
      html += '<summary>' + escapeHtml(mod.name);
      html += '<span class="summary">' + escapeHtml(mod.description) + '</span>';
      html += '</summary>';
      html += '<div class="detail-content">';
      html += '<table><thead><tr><th>方法</th><th>路径</th><th>说明</th><th style="display:none" data-show="lg">参数</th></tr></thead><tbody>';

      mod.endpoints.forEach(ep => {
        html += '<tr>';
        html += '<td><span class="method method-get">' + escapeHtml(ep.method) + '</span></td>';
        html += '<td class="mono" style="font-size:13px;">/' + apiDir + '/' + mod.id + escapeHtml(ep.path) + '</td>';
        html += '<td class="text-dim">' + escapeHtml(ep.description) + '</td>';
        html += '<td class="text-muted mono" style="font-size:12px;display:none" data-show="lg">' + escapeHtml(ep.params) + '</td>';
        html += '</tr>';
      });

      html += '</tbody></table></div></details>';
    });

    container.innerHTML = html;

    // 文档链接
    const docsContainer = document.getElementById('docsContainer');
    let docsHtml = '<a href="docs/README.md" class="card" style="padding: 12px 16px; display: block;"><div style="font-size: 12px; color: #71717a;">入门</div><div style="font-size: 14px; font-weight: 500;">README</div></a>';
    data.modules.forEach(mod => {
      docsHtml += '<a href="docs/' + mod.id + '.md" class="card" style="padding: 12px 16px; display: block;"><div style="font-size: 12px; color: #71717a;">模块</div><div style="font-size: 14px; font-weight: 500;">' + escapeHtml(mod.name) + '</div></a>';
    });
    docsContainer.innerHTML = docsHtml;

    updateVisibility();

  } catch (e) {
    document.getElementById('modulesContainer').innerHTML = '<div style="color:#dc2626; padding: 20px 0;">加载失败: ' + e.message + '</div>';
  }
}

function updateVisibility() {
  const w = window.innerWidth;
  document.querySelectorAll('[data-show="lg"]').forEach(el => el.style.display = w >= 1024 ? '' : 'none');
}
window.addEventListener('resize', updateVisibility);

loadApiModules();
</script>
</body>
</html>
